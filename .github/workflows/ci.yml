name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: shift-left-happens/fake_info_backend
          path: backend

      - name: Start backend (test stack)
        run: docker compose -f backend/docker-compose.yml -p test --env-file backend/.env.test up -d --build

      - name: Wait for MariaDB
        run: |
          for i in $(seq 1 15); do
            docker compose -f backend/docker-compose.yml -p test exec db mysqladmin ping -u root --silent && break
            sleep 2
          done

      - name: Wait for PHP/Apache
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:8081/cpr && break
            sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm test

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Tear down backend
        if: always()
        run: docker compose -f backend/docker-compose.yml -p test down -v

  deploy-report:
    needs: [lint, e2e]
    runs-on: ubuntu-latest
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
